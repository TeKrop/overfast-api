default_language_version:
  python: python3.14
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        name: (ruff) Linting and fixing code
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: (ruff) Formatting code
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: ty check .
        language: system
        pass_filenames: false
        always_run: true
