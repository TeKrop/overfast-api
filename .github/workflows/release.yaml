name: "Release & Deploy"

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release with Python Semantic Release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    env:
      GIT_COMMITTER_NAME: "github-actions"
      GIT_COMMITTER_EMAIL: "actions@users.noreply.github.com"

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Action | Semantic Version Release
        id: release
        # Adjust tag with desired version if applicable.
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: ${{ env.GIT_COMMITTER_NAME }}
          git_committer_email: ${{ env.GIT_COMMITTER_EMAIL }}

      - name: Setup | uv
        if: steps.release.outputs.released == 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"

      - name: Update | uv.lock
        if: steps.release.outputs.released == 'true'
        run: |
          uv lock
          if ! git diff --quiet -- uv.lock; then
            # The PSR step's git config above only applies inside its own Docker
            # container, so it isn't visible to this (non-containerized) step.
            git config user.name "$GIT_COMMITTER_NAME"
            git config user.email "$GIT_COMMITTER_EMAIL"
            git add uv.lock
            git commit -m "chore: update uv.lock for v${{ steps.release.outputs.version }}"
            git pull --rebase
            git push
          fi
  deploy:
    name: Deploy on VPS
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            bash "${{ secrets.DEPLOY_SCRIPT_PATH }}"
